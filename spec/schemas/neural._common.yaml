          x-version-added: '3.1'
        processors.search.hybrid.norm_zscore_processors:
          $ref: '#/components/schemas/InfoCounterStat'
          x-version-added: '3.1'
        processors.search.hybrid.rank_based_normalization_processors:
          $ref: '#/components/schemas/InfoCounterStat'
          x-version-added: '3.1'
          
        # Search processors - combination related
