          $ref: '#/components/schemas/InfoCounterStat'
          x-version-added: '3.1'
        processors.search.hybrid.comb_rrf_processors:
          $ref: '#/components/schemas/InfoCounterStat'
          x-version-added: '3.1'
        processors.search.hybrid.comb_harmonic_processors:
