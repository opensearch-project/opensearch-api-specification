$schema: ../../../json_schemas/test_story.schema.yaml

description: Get k-NN stats.
chapters:
  - synopsis: Get k-NN stats.
    method: GET
    path: /_plugins/_knn/stats
    response:
      status: 200
  - synopsis: Get k-NN stat.
    method: GET
    path: /_plugins/_knn/stats/{stat}
    parameters:
      stat:
        - hit_count
    response:
      status: 200
