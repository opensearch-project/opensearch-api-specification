$schema: ../../../../json_schemas/test_story.schema.yaml

description: Test agentic query schema validation.
version: '>=3.2'
warnings:
  invalid-path-detected: false
prologues:
  - path: /books
    method: PUT
    request:
      payload:
        mappings:
          properties:
            title:
              type: text
            author:
              type: text
            year:
              type: integer

  - path: /_bulk
    method: POST
    parameters:
      refresh: true
    request:
      content_type: application/x-ndjson
      payload:
        - {index: {_index: books, _id: book1}}
        - {title: To Kill a Mockingbird, author: Harper Lee, year: 1960}
        - {index: {_index: books, _id: book2}}
        - {title: '1984', author: George Orwell, year: 1949}
        - {index: {_index: books, _id: book3}}
        - {title: The Great Gatsby, author: F. Scott Fitzgerald, year: 1925}
epilogues:
  - path: /books
    method: DELETE
    status: [200, 404]
chapters:
  - synopsis: Search with agentic query containing query_text and query_fields.
    path: /{index}/_search
    method: POST
    parameters:
      index: books
    request:
      payload:
        query:
          agentic:
            query_text: List all the flowers present
            query_fields:
              - author
              - title
    response:
      status: 200
