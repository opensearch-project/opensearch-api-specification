$schema: ../../../../../json_schemas/test_story.schema.yaml

description: Test terms aggregation with value_type parameter (ValueType enum).
warnings:
  invalid-path-detected: false
prologues:
  - path: /products
    method: PUT
    request:
      payload:
        mappings:
          properties:
            category_code:
              type: text
              fielddata: true
  - path: /_bulk
    method: POST
    parameters:
      refresh: true
    request:
      content_type: application/x-ndjson
      payload:
        - {create: {_index: products}}
        - {category_code: '100', name: Electronics}
        - {create: {_index: products}}
        - {category_code: '200', name: Books}
        - {create: {_index: products}}
        - {category_code: '100', name: Gadgets}
chapters:
  - synopsis: Aggregate with terms using value_type to coerce text field to long.
    path: /{index}/_search
    parameters:
      index: products
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          categories:
            terms:
              field: category_code
              value_type: long
    response:
      status: 200
      payload:
        aggregations:
          categories:
            buckets:
              - key: 100
                doc_count: 2

  - synopsis: Aggregate with terms using value_type string.
    path: /{index}/_search
    parameters:
      index: products
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          categories:
            terms:
              field: category_code
              value_type: string
    response:
      status: 200

  - synopsis: Aggregate with terms using value_type double.
    path: /{index}/_search
    parameters:
      index: products
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          categories:
            terms:
              field: category_code
              value_type: double
    response:
      status: 200

  - synopsis: Aggregate with terms using value_type byte (alias that maps to long).
    path: /{index}/_search
    parameters:
      index: products
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          categories:
            terms:
              field: category_code
              value_type: byte
    response:
      status: 200

  - synopsis: Aggregate with terms using value_type short (alias that maps to long).
    path: /{index}/_search
    parameters:
      index: products
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          categories:
            terms:
              field: category_code
              value_type: short
    response:
      status: 200

  - synopsis: Aggregate with terms using value_type integer (alias that maps to long).
    path: /{index}/_search
    parameters:
      index: products
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          categories:
            terms:
              field: category_code
              value_type: integer
    response:
      status: 200

  - synopsis: Aggregate with terms using value_type unsigned_long.
    path: /{index}/_search
    parameters:
      index: products
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          categories:
            terms:
              field: category_code
              value_type: unsigned_long
    response:
      status: 200
epilogues:
  - path: /products
    method: DELETE
    status: [200, 404]
