$schema: ../../../../../json_schemas/test_story.schema.yaml

description: Test min aggregation with value_type parameter for script outputs.
warnings:
  invalid-path-detected: false
prologues:
  - path: /_bulk
    method: POST
    parameters:
      refresh: true
    request:
      content_type: application/x-ndjson
      payload:
        - {create: {_index: products}}
        - {price: 100.5, category: electronics}
        - {create: {_index: products}}
        - {price: 50.25, category: books}
        - {create: {_index: products}}
        - {price: 75, category: electronics}
chapters:
  - synopsis: Aggregate with min using value_type double on script output.
    path: /{index}/_search
    parameters:
      index: products
    method: POST
    request:
      payload:
        size: 0
        aggs:
          min_price:
            min:
              script:
                source: doc['price'].value
              value_type: double
    response:
      status: 200
      payload:
        aggregations:
          min_price:
            value: 50.25

