  - synopsis: Aggregate with min using value_type numeric.
    path: /{index}/_search
    parameters:
      index: products
    method: POST
    request:
      payload:
        size: 0
        aggs:
          min_price:
            min:
              field: price
              value_type: numeric
    response:
      status: 200
epilogues:
  - path: /products
    method: DELETE
    status: [200, 404]
