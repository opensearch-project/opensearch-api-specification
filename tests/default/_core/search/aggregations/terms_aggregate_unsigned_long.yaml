$schema: ../../../../../json_schemas/test_story.schema.yaml

description: Test UnsignedLongTermsAggregate response for unsigned_long field type.
version: '>= 2.8'
warnings:
  invalid-path-detected: false
prologues:
  - path: /metrics
    method: PUT
    request:
      payload:
        mappings:
          properties:
            metric_id:
              type: unsigned_long
            value:
              type: float
            timestamp:
              type: date
  - path: /_bulk
    method: POST
    parameters:
      refresh: true
    request:
      content_type: application/x-ndjson
      payload:
        - {create: {_index: metrics}}
        - {metric_id: 9223372036854775808, value: 100.5, timestamp: '2024-01-01T00:00:00Z'}
        - {create: {_index: metrics}}
        - {metric_id: 9223372036854775808, value: 200.3, timestamp: '2024-01-01T01:00:00Z'}
        - {create: {_index: metrics}}
        - {metric_id: 18446744073709551615, value: 50.1, timestamp: '2024-01-01T02:00:00Z'}
        - {create: {_index: metrics}}
        - {metric_id: 12345678901234567890, value: 75.8, timestamp: '2024-01-01T03:00:00Z'}
        - {create: {_index: metrics}}
        - {metric_id: 12345678901234567890, value: 90.2, timestamp: '2024-01-01T04:00:00Z'}
chapters:
  - synopsis: Aggregate by unsigned_long field to test UnsignedLongTermsAggregate.
    path: /{index}/_search
    parameters:
      index: metrics
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          metric_ids:
            terms:
              field: metric_id
    response:
      status: 200
      payload:
        aggregations:
          metric_ids:
            buckets:
              - key: 9223372036854775808
                doc_count: 2
              - key: 12345678901234567890
                doc_count: 2

  - synopsis: Aggregate by unsigned_long field with nested max aggregation.
    path: /{index}/_search
    parameters:
      index: metrics
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          metric_ids:
            terms:
              field: metric_id
              size: 2
              order:
                _key: asc
            aggregations:
              max_value:
                max:
                  field: value
    response:
      status: 200
      payload:
        aggregations:
          metric_ids:
            buckets:
              - key: 9223372036854775808
                doc_count: 2
              - key: 12345678901234567890
                doc_count: 2

  - synopsis: Aggregate by unsigned_long field with order by count.
    path: /{index}/_search
    parameters:
      index: metrics
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          metric_ids:
            terms:
              field: metric_id
              size: 1
              order:
                _count: desc
    response:
      status: 200
epilogues:
  - path: /metrics
    method: DELETE
    status: [200, 404]
