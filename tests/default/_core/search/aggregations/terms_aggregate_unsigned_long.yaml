$schema: ../../../../../json_schemas/test_story.schema.yaml

description: Test UnsignedLongTermsAggregate response for unsigned_long field type.
version: '>= 2.8'
warnings:
  invalid-path-detected: false
prologues:
  - path: /metrics
    method: PUT
    request:
      payload:
        mappings:
          properties:
            metric_id:
              type: unsigned_long
            value:
              type: float
            timestamp:
              type: date
  - path: /_bulk
    method: POST
    parameters:
      refresh: true
    request:
      content_type: application/x-ndjson
      payload:
        - {create: {_index: metrics}}
        - {metric_id: 9223372036854775808, value: 100.5, timestamp: '2024-01-01T00:00:00Z'}
        - {create: {_index: metrics}}
        - {metric_id: 9223372036854775808, value: 200.3, timestamp: '2024-01-01T01:00:00Z'}
        - {create: {_index: metrics}}
        - {metric_id: 18446744073709551615, value: 50.1, timestamp: '2024-01-01T02:00:00Z'}
        - {create: {_index: metrics}}
        - {metric_id: 12345678901234567890, value: 75.8, timestamp: '2024-01-01T03:00:00Z'}
        - {create: {_index: metrics}}
        - {metric_id: 12345678901234567890, value: 90.2, timestamp: '2024-01-01T04:00:00Z'}
chapters:
  - synopsis: Aggregate by unsigned_long field to test UnsignedLongTermsAggregate.
    path: /{index}/_search
    parameters:
      index: metrics
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          metric_ids:
            terms:
              field: metric_id
    response:
      status: 200
      payload:
        aggregations:
          metric_ids:
            doc_count_error_upper_bound: 0
            sum_other_doc_count: 0
            buckets:
              - key: 9223372036854775808
                doc_count: 2
              - key: 12345678901234567890
                doc_count: 2

  - synopsis: Aggregate by unsigned_long field with nested aggregations to validate additionalProperties.
    path: /{index}/_search
    parameters:
      index: metrics
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          metric_ids:
            terms:
              field: metric_id
              size: 2
              order:
                _key: asc
            aggregations:
              max_value:
                max:
                  field: value
              min_value:
                min:
                  field: value
              total_quantity:
                sum:
                  field: value
    response:
      status: 200
      payload:
        aggregations:
          metric_ids:
            doc_count_error_upper_bound: 0
            sum_other_doc_count: 0
            buckets:
              - key: 9223372036854775808
                doc_count: 2
                max_value:
                  value: 200.3
                min_value:
                  value: 100.5
                total_quantity:
                  value: 300.8
              - key: 12345678901234567890
                doc_count: 2
                max_value:
                  value: 90.2
                min_value:
                  value: 75.8
                total_quantity:
                  value: 166.0

  - synopsis: Aggregate by unsigned_long field with show_term_doc_count_error.
    path: /{index}/_search
    parameters:
      index: metrics
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          metric_ids:
            terms:
              field: metric_id
              show_term_doc_count_error: true
    response:
      status: 200
      payload:
        aggregations:
          metric_ids:
            doc_count_error_upper_bound: 0
            sum_other_doc_count: 0
            buckets:
              - key: 9223372036854775808
                doc_count: 2
                doc_count_error_upper_bound: 0
              - key: 12345678901234567890
                doc_count: 2
                doc_count_error_upper_bound: 0

  - synopsis: Aggregate by unsigned_long field with custom format to populate key_as_string.
    path: /{index}/_search
    parameters:
      index: metrics
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          metric_ids:
            terms:
              field: metric_id
              size: 2
              format: '0,000'
    response:
      status: 200
      payload:
        aggregations:
          metric_ids:
            doc_count_error_upper_bound: 0
            sum_other_doc_count: 0
            buckets:
              - key: 9223372036854775808
                key_as_string: '9,223,372,036,854,775,808'
                doc_count: 2
              - key: 12345678901234567890
                key_as_string: '12,345,678,901,234,567,890'
                doc_count: 2

  - synopsis: Aggregate by unsigned_long field with order by count and verify max uint64 value.
    path: /{index}/_search
    parameters:
      index: metrics
    method: POST
    request:
      payload:
        size: 0
        aggregations:
          metric_ids:
            terms:
              field: metric_id
              size: 3
              order:
                _count: desc
    response:
      status: 200
      payload:
        aggregations:
          metric_ids:
            buckets:
              - key: 9223372036854775808
                doc_count: 2
              - key: 12345678901234567890
                doc_count: 2
epilogues:
  - path: /metrics
    method: DELETE
    status: [200, 404]
