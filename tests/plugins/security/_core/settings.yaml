$schema: ../../../../json_schemas/test_story.schema.yaml

description: Test settings.
prologues:
  - path: /movies
    method: PUT
epilogues:
  - path: /movies
    method: DELETE
    status: [200, 404]
chapters:
  - synopsis: Update cluster settings.
    path: /_settings
    method: PUT
    request:
      payload:
        settings:
          index:
            number_of_replicas: 4
  - synopsis: Get settings.
    path: /_settings
    method: GET
