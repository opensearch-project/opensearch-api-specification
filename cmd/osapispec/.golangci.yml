version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - decorder
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - goconst
    - gocritic
    - godox
    - goheader
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - grouper
    - importas
    - ineffassign
    - interfacebloat
    - lll
    - makezero
    - mirror
    - misspell
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - prealloc
    - predeclared
    - reassign
    - revive
    - staticcheck
    - tagalign
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: true
    exhaustive:
      default-signifies-exhaustive: false
    goconst:
      min-len: 3
      min-occurrences: 3
    godox:
      keywords:
        - BUG
        - FIXME
        - HACK
    lll:
      line-length: 140
    misspell:
      locale: US
      ignore-rules:
        - cancelled
    nolintlint:
      require-explanation: true
      require-specific: true
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
          severity: error
          disabled: false
    testifylint:
      enable-all: true
    unparam:
      check-exported: true
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - gochecknoglobals
          - gochecknoinits
          - goconst
          - noctx
        path: _test\.go
      - linters:
          - gosec
        path: _test\.go
        text: math/rand
      - linters:
          - gosec
        path: internal/osclient/
        text: TLS InsecureSkipVerify set true
      - linters:
          - gochecknoglobals
        path: internal/
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/opensearch-project/opensearch-api-specification)
    goimports:
      local-prefixes:
        - github.com/opensearch-project/opensearch-api-specification
  exclusions:
    generated: lax
