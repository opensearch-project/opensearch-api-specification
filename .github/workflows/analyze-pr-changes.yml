name: Analyze PR Changes

on: [pull_request]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/osapispec/go.mod
          cache-dependency-path: cmd/osapispec/go.sum

      - name: Install Node deps
        run: npm ci

      - name: Build osapispec binary
        run: go build -o /tmp/osapispec .
        working-directory: cmd/osapispec

      - name: Setup Environment Variables
        shell: bash -eo pipefail {0}
        run: |
          BEFORE_SHA=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          AFTER_SHA=${HEAD_SHA}
          CLUSTER_SPEC=/tmp/opensearch-openapi-CLUSTER.yaml
          BEFORE_SPEC=/tmp/opensearch-openapi-${BEFORE_SHA}.yaml
          AFTER_SPEC=/tmp/opensearch-openapi-${AFTER_SHA}.yaml
          BEFORE_COVERAGE=/tmp/coverage-api-${BEFORE_SHA}.json
          AFTER_COVERAGE=/tmp/coverage-api-${AFTER_SHA}.json
          COVERAGE_DIFF=/tmp/coverage-api-${BEFORE_SHA}-${AFTER_SHA}-DIFF.json

          vars=(
            BEFORE_SHA
            AFTER_SHA
            CLUSTER_SPEC
            BEFORE_SPEC
            AFTER_SPEC
            BEFORE_COVERAGE
            AFTER_COVERAGE
            COVERAGE_DIFF
          )

          {
            for var in "${vars[@]}"
            do
              echo "${var}=${!var}"
            done
          } | tee "$GITHUB_ENV"
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Dump OpenSearch Cluster's API (Node — gating)
        shell: bash -eo pipefail {0}
        run: |
          docker build coverage --tag opensearch-with-api-plugin

          docker run \
            --name opensearch \
            --rm -d \
            -p 9200:9200 -p 9600:9600 \
            -e "discovery.type=single-node" \
            -e OPENSEARCH_INITIAL_ADMIN_PASSWORD="$OPENSEARCH_PASSWORD" \
            opensearch-with-api-plugin

          start=$(date +%s)
          npm run dump-cluster-spec -- --opensearch-insecure --output $CLUSTER_SPEC
          echo "::notice::Node dump: $(($(date +%s) - start))s"
        env:
          OPENSEARCH_PASSWORD: BobgG7YrtsdKf9M

      - name: Dump OpenSearch Cluster's API (Go — shadow)
        id: go-dump
        continue-on-error: true
        shell: bash -eo pipefail {0}
        run: |
          start=$(date +%s)
          /tmp/osapispec dump \
            -insecure \
            -password=$OPENSEARCH_PASSWORD \
            -output=/tmp/cluster-go.yaml
          echo "::notice::Go dump: $(($(date +%s) - start))s"
        env:
          OPENSEARCH_PASSWORD: BobgG7YrtsdKf9M

      - name: Stop OpenSearch
        if: always()
        run: docker stop opensearch || true

      - name: Compare Node vs Go dump outputs
        if: steps.go-dump.outcome == 'success'
        continue-on-error: true
        run: |
          if diff -u $CLUSTER_SPEC /tmp/cluster-go.yaml > /tmp/dump-diff.txt; then
            echo "::notice::Node and Go dump outputs are identical"
          else
            echo "::warning::Node and Go dump outputs differ ($(wc -l < /tmp/dump-diff.txt) diff lines)"
            head -200 /tmp/dump-diff.txt
          fi

      - name: Checkout BEFORE Spec
        shell: bash -eo pipefail {0}
        run: git checkout $BEFORE_SHA -- spec/

      - name: Build BEFORE Spec (Node — gating)
        shell: bash -eo pipefail {0}
        run: |
          start=$(date +%s)
          npm run merge -- --source ./spec --output $BEFORE_SPEC
          echo "::notice::Node merge (BEFORE): $(($(date +%s) - start))s"

      - name: Checkout AFTER Spec
        shell: bash -eo pipefail {0}
        run: git checkout $AFTER_SHA -- spec/

      - name: Build AFTER Spec (Node — gating)
        shell: bash -eo pipefail {0}
        run: |
          start=$(date +%s)
          npm run merge -- --source ./spec --output $AFTER_SPEC
          echo "::notice::Node merge (AFTER): $(($(date +%s) - start))s"

      - name: Build AFTER Spec (Go — shadow)
        id: go-merge
        continue-on-error: true
        shell: bash -eo pipefail {0}
        run: |
          start=$(date +%s)
          /tmp/osapispec merge -source spec -output /tmp/after-go.yaml
          echo "::notice::Go merge (AFTER): $(($(date +%s) - start))s"

      - name: Compare Node vs Go merge outputs (AFTER)
        if: steps.go-merge.outcome == 'success'
        continue-on-error: true
        run: |
          if diff -u $AFTER_SPEC /tmp/after-go.yaml > /tmp/merge-diff.txt; then
            echo "::notice::Node and Go merge outputs are identical"
          else
            echo "::warning::Node and Go merge outputs differ ($(wc -l < /tmp/merge-diff.txt) diff lines)"
            head -200 /tmp/merge-diff.txt
          fi

      - name: Calculate Coverage (Node — gating)
        shell: bash -eo pipefail {0}
        run: |
          start=$(date +%s)
          npm run coverage:spec -- \
              --cluster $CLUSTER_SPEC \
              --specification $BEFORE_SPEC \
              --output $BEFORE_COVERAGE

          npm run coverage:spec -- \
              --cluster $CLUSTER_SPEC \
              --specification $AFTER_SPEC \
              --output $AFTER_COVERAGE
          echo "::notice::Node coverage: $(($(date +%s) - start))s"

          jq . $AFTER_COVERAGE

          jq --slurp '
            [ .[].counts ]
            | {
              "before": (.[0]),
              "after": (.[1]),
              "covered_delta": (.[1].covered - .[0].covered),
              "covered_pct_delta": ((.[1].covered_pct - .[0].covered_pct) * 100 | round / 100),
              "uncovered_delta": (.[1].uncovered - .[0].uncovered),
              "uncovered_pct_delta": ((.[1].uncovered_pct - .[0].uncovered_pct) * 100 | round / 100),
              "specified_but_not_provided_delta": (.[1].specified_but_not_provided - .[0].specified_but_not_provided)
            }
            ' \
            $BEFORE_COVERAGE \
            $AFTER_COVERAGE \
            | tee $COVERAGE_DIFF

      - name: Calculate Coverage (Go — shadow)
        id: go-coverage
        continue-on-error: true
        shell: bash -eo pipefail {0}
        run: |
          start=$(date +%s)
          /tmp/osapispec coverage \
              -cluster=$CLUSTER_SPEC \
              -specification=$AFTER_SPEC \
              -output=/tmp/coverage-after-go.json
          echo "::notice::Go coverage: $(($(date +%s) - start))s"

      - name: Compare Node vs Go coverage outputs
        if: steps.go-coverage.outcome == 'success'
        continue-on-error: true
        run: |
          if diff -u $AFTER_COVERAGE /tmp/coverage-after-go.json > /tmp/coverage-diff.txt; then
            echo "::notice::Node and Go coverage outputs are identical"
          else
            echo "::warning::Node and Go coverage outputs differ ($(wc -l < /tmp/coverage-diff.txt) diff lines)"
            head -200 /tmp/coverage-diff.txt
          fi

      - name: Upload Coverage Data
        id: upload-coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: |
            /tmp/coverage-api-*.json

      - name: Install openapi-changes
        shell: bash -eo pipefail {0}
        run: npm install --global @pb33f/openapi-changes

      - name: Generate API Changes HTML Report
        shell: bash -eo pipefail {0}
        run: openapi-changes html-report --no-logo --no-color $BEFORE_SPEC $AFTER_SPEC

      - name: Upload API Changes HTML Report
        id: upload-api-changes-report
        uses: actions/upload-artifact@v4
        with:
          name: api-changes-report
          path: |
            report.html
            /tmp/opensearch-openapi-*.yaml

      - name: Generate API Changes Summary
        shell: bash -eo pipefail {0}
        run: |
          if ! openapi-changes summary --no-logo --no-color --markdown $BEFORE_SPEC $AFTER_SPEC >output.md 2>error.log ; then
            if ! grep -q 'breaking changes discovered' error.log ; then
              cat error.log >/dev/stderr
              cat output.md >/dev/stderr
              exit 1
            fi
          fi

          gawk '
            BEGIN {
              RS = "(\r|\n|\r\n)"
              WAS_BLANK = 0
              HAD_CHANGES = 0
            }

            /^starting work/ || /^Building original model/ || /^Date:/ || /^SPEC:/ || /^ERROR:/ || /^DONE:/ {
              next
            }

            /^[[:space:]]*$/ {
              WAS_BLANK = 1
              next
            }

            WAS_BLANK {
              WAS_BLANK = 0
              print ""
            }

            {
              HAD_CHANGES = 1
              print
            }

            END {
              if (!HAD_CHANGES) {
                print "**NO CHANGES**\n"
              }
            }
          ' output.md | tee changes-summary.md

      - name: Construct Comment Data Payload
        shell: bash -eo pipefail {0}
        run: |
          jq \
            --arg pr_number ${PR_NUMBER} \
            --arg before_sha ${BEFORE_SHA} \
            --arg after_sha ${AFTER_SHA} \
            --arg api_changes_report_url "${API_CHANGES_REPORT_URL}" \
            --rawfile api_changes_summary ./changes-summary.md \
            --slurpfile api_coverage $COVERAGE_DIFF \
            --null-input '
            {
              "pr_number": ($pr_number),
              "comment_identifier": "# Changes Analysis",
              "template_name": "pr-change-analysis",
              "template_data": {
                "before_sha": ($before_sha),
                "after_sha": ($after_sha),
                "api_changes_report_url": ($api_changes_report_url),
                "api_changes_summary": ($api_changes_summary),
                "api_coverage": ($api_coverage[0])
              }
            }
            ' | tee pr-comment.json
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          API_CHANGES_REPORT_URL: ${{ steps.upload-api-changes-report.outputs.artifact-url }}

      - name: Upload PR Comment Payload
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment
          path: pr-comment.json
