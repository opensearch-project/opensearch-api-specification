name: Build and Publish Spec

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/osapispec/go.mod
          cache-dependency-path: cmd/osapispec/go.sum

      - name: Install Node deps
        run: npm ci

      - name: Build osapispec binary
        run: go build -o /tmp/osapispec .
        working-directory: cmd/osapispec

      - name: Build Spec (Node — gating)
        run: |
          mkdir -p build
          start=$(date +%s)
          npm run merge -- --source spec --output build/opensearch-openapi.yaml
          echo "::notice::Node merge: $(($(date +%s) - start))s"

      - name: Build Spec (Go — shadow)
        id: go-merge
        continue-on-error: true
        run: |
          start=$(date +%s)
          /tmp/osapispec merge -source spec -output /tmp/opensearch-openapi-go.yaml
          echo "::notice::Go merge: $(($(date +%s) - start))s"

      - name: Compare Node vs Go merge outputs
        if: steps.go-merge.outcome == 'success'
        continue-on-error: true
        run: |
          if diff -u build/opensearch-openapi.yaml /tmp/opensearch-openapi-go.yaml > /tmp/merge-diff.txt; then
            echo "::notice::Node and Go merge outputs are identical"
          else
            echo "::warning::Node and Go merge outputs differ ($(wc -l < /tmp/merge-diff.txt) diff lines)"
            head -200 /tmp/merge-diff.txt
          fi

      - name: Extract Branch Name
        id: branch
        shell: bash
        run: echo "name=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT

      - name: Upload Artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            build/*

      - name: Release Specification to GitHub
        id: release
        uses: marvinpinto/action-automatic-releases@v1.2.1
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: ${{ steps.branch.outputs.name }}-latest
          prerelease: true
          title: OpenSearch OpenAPI Spec (${{ steps.branch.outputs.name }})
          files: |
            LICENSE.txt
            build/*

      - name: Extract Changelog
        id: changelog
        uses: sean0x42/markdown-extract@v2
        with:
          file: CHANGELOG.md
          pattern: Unreleased

      - name: Update Release Description
        id: update
        uses: tubone24/update_release@v1.3.1
        env:
          TAG_NAME: ${{ steps.branch.outputs.name }}-latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            ${{ steps.changelog.outputs.markdown }}

            ### Links
            - [Build Artifact](${{ steps.upload.outputs.artifact-url }})
