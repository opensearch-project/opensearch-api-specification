name: Build and Publish Spec

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout the repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '20'

      - name: Build
        run: npm ci && npm run merge

      - name: Extract Branch Name
        id: branch
        shell: bash
        run: echo "name=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT

      - name: Upload Artifacts
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build
          path: |
            build/*

      - name: Trigger Proto Convert Workflow
        uses: peter-evans/repository-dispatch@bf47d102fdb849e755b0b0023ea3e81a44b6f570 # v2
        with:
          token: ${{ secrets.OSPT_PAT }}
          repository: opensearch-project/opensearch-protobufs
          event-type: spec-updated
          client-payload: |
            {
              "artifact_download_url": "${{ steps.upload.outputs.artifact-url }}"
            }

      - name: Release Specification to GitHub
        id: release
        uses: marvinpinto/action-automatic-releases@919008cf3f741b179569b7a6fb4d8860689ab7f0 # v1.2.1
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: ${{ steps.branch.outputs.name }}-latest
          prerelease: true
          title: OpenSearch OpenAPI Spec (${{ steps.branch.outputs.name }})
          files: |
            LICENSE.txt
            build/*

      - name: Extract Changelog
        id: changelog
        uses: sean0x42/markdown-extract@4178293dd16a52514b6cb2c01f4d309d264b2736 # v2
        with:
          file: CHANGELOG.md
          pattern: Unreleased

      - name: Update Release Description
        id: update
        uses: tubone24/update_release@c04c17054b939144ec8a7cba969d74992f812d66 # v1.3.1
        env:
          TAG_NAME: ${{ steps.branch.outputs.name }}-latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            ${{ steps.changelog.outputs.markdown }}

            ### Links
            - [Build Artifact](${{ steps.upload.outputs.artifact-url }})
