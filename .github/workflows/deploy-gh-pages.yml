# deploys to https://opensearch-project.github.io/opensearch-api-specification/
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '20'

      - name: Setup Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build with Jekyll
        run: |-
          gem install jekyll
          jekyll build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          folder: _site
          branch: gh-pages


      - name: Trigger Proto Convert Workflow
        uses: peter-evans/repository-dispatch@bf47d102fdb849e755b0b0023ea3e81a44b6f570 # v2
        with:
          token: ${{ secrets.OSPT_PAT }}
          repository: opensearch-project/opensearch-protobufs
          event-type: spec-updated
          client-payload: |
            {
              "spec_repository": "opensearch-project/opensearch-api-specification",
              "spec_tag": "main-latest",
              "pr_number": "${{ github.event.pull_request.number || '' }}",
              "ref": "${{ github.ref }}"
            }
