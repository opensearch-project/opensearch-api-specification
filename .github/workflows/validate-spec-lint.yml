name: Validate Spec

on:
  push:
    branches: ['**']
    paths:
      - 'spec/**'
      - 'tools/src/linter/**'
  pull_request:
    branches: ['**']
    paths:
      - 'spec/**'
      - 'tools/src/linter/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Spec
        run: npm run lint:spec
