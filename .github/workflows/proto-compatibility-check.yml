name: Proto Compatibility Check

on:
  pull_request:
    paths:
      - 'spec/**'

jobs:
  build-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/osapispec/go.mod
          cache-dependency-path: cmd/osapispec/go.sum

      - name: Install Node deps
        run: npm ci

      - name: Build osapispec binary
        run: go build -o /tmp/osapispec .
        working-directory: cmd/osapispec

      - name: Generate merged OpenAPI spec (Node — gating)
        run: |
          mkdir -p build
          start=$(date +%s)
          npm run merge -- --source ./spec --output build/opensearch-openapi.yaml
          echo "::notice::Node merge: $(($(date +%s) - start))s"

      - name: Generate merged OpenAPI spec (Go — shadow)
        id: go-merge
        continue-on-error: true
        run: |
          start=$(date +%s)
          /tmp/osapispec merge -source spec -output /tmp/opensearch-openapi-go.yaml
          echo "::notice::Go merge: $(($(date +%s) - start))s"

      - name: Compare Node vs Go merge outputs
        if: steps.go-merge.outcome == 'success'
        continue-on-error: true
        run: |
          if diff -u build/opensearch-openapi.yaml /tmp/opensearch-openapi-go.yaml > /tmp/merge-diff.txt; then
            echo "::notice::Node and Go merge outputs are identical"
          else
            echo "::warning::Node and Go merge outputs differ ($(wc -l < /tmp/merge-diff.txt) diff lines)"
            head -200 /tmp/merge-diff.txt
          fi

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: ./build/opensearch-openapi.yaml
          retention-days: 7

  compatibility-report:
    needs: build-spec
    uses: opensearch-project/opensearch-protobufs/.github/workflows/backward-compatible-report.yml@main
    with:
      spec_artifact_name: openapi-spec

  upload-report:
    needs: compatibility-report
    runs-on: ubuntu-latest
    steps:
      - name: Create Report Payload
        shell: bash -eo pipefail {0}
        run: |
          mkdir -p reports

          # Save report to file first
          cat > reports/report.txt << 'EOF'
          ${{ needs.compatibility-report.outputs.report }}
          EOF

          # Create JSON payload with PR number and report from file
          jq -n \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            --rawfile report reports/report.txt \
            '{
              "pr_number": ($pr_number | tonumber),
              "report": $report
            }' > reports/proto-comment-payload.json

          echo "JSON Payload created:"
          cat reports/proto-comment-payload.json

      - name: Upload Report Payload
        uses: actions/upload-artifact@v4
        with:
          name: proto-comment-payload
          path: reports/proto-comment-payload.json
          retention-days: 1
