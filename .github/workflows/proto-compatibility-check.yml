name: Proto Compatibility Check

on:
  pull_request:
    paths:
      - 'spec/**'

jobs:
  build-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate merged OpenAPI spec
        run: npm run merge -- --source ./spec --output ./build/opensearch-openapi.yaml

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: openapi-spec
          path: ./build/opensearch-openapi.yaml
          retention-days: 7

  compatibility-report:
    needs: build-spec
    uses: opensearch-project/opensearch-protobufs/.github/workflows/backward-compatible-report.yml@6e726093c899125facf68eab2b4ef10c4c1bff5d # main
    with:
      spec_artifact_name: openapi-spec

  upload-report:
    needs: compatibility-report
    runs-on: ubuntu-latest
    steps:
      - name: Create Report Payload
        shell: bash -eo pipefail {0}
        run: |
          mkdir -p reports

          # Save report to file first
          cat > reports/report.txt << 'EOF'
          ${{ needs.compatibility-report.outputs.report }}
          EOF

          # Create JSON payload with PR number and report from file
          jq -n \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            --rawfile report reports/report.txt \
            '{
              "pr_number": ($pr_number | tonumber),
              "report": $report
            }' > reports/proto-comment-payload.json

          echo "JSON Payload created:"
          cat reports/proto-comment-payload.json

      - name: Upload Report Payload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: proto-comment-payload
          path: reports/proto-comment-payload.json
          retention-days: 1
